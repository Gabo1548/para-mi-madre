<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para una chica especial</title>
    <style>
        body {
            background-color: #ffeef2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 300px;
        }
        h1 { color: #ff4d6d; font-size: 22px; }
        p { color: #555; font-size: 16px; line-height: 1.5; }
        .heart {
            font-size: 60px;
            color: #ff4d6d;
            margin-bottom: 20px;
            animation: latido 1.2s infinite;
        }
        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .boton {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart">❤️</div>
        <h1>¡Hola!</h1>
        <p>Hice esta pequeña página solo para recordarte que eres alguien muy especial para mí.</p>
        <button class="boton" onclick="alert('¡Espero que esto te haya hecho sonreír! 😊')">Haz clic aquí</button>
    </div>

</body>
</html>
